<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f7f4ee;
        color: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 183, 77, 0.35), transparent 40%),
          linear-gradient(135deg, #fffaf2 0%, #f3efe7 100%);
      }

      h1 {
        margin: 0;
        padding: 1rem;
        font-size: clamp(3rem, 12vw, 8rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
  </body>
</html>
